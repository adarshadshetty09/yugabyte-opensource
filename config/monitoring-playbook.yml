# STEP 1
- name: Start primary node
  hosts: nodes[0]
  become: yes
  roles:
    - role: ybdb
      tags: primary

# STEP 2
- name: Wait for master to be ready
  hosts: nodes[1:]
  gather_facts: no
  tasks:
    - name: Wait for master UI
      tags: wait
      wait_for:
        host: "{{ hostvars[groups['nodes'][0]].ansible_host }}"
        port: 7000
        delay: 5
        timeout: 120

# STEP 3
- name: Start follower nodes
  hosts: nodes[1:]
  serial: 1
  become: yes
  roles:
    - role: ybdb
      tags: follower

# STEP 4
- name: Setup monitoring
  hosts: monitoring
  become: yes
  roles:
    - role: monitoring
      tags: monitoring

- name: Setup monitoring nodes
  hosts: nodes
  become: yes
  roles:
    - role: monitoring
      tags: monitoring