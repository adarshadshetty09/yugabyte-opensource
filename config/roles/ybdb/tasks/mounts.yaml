---
# ==============================
# ENTERPRISE DISK SETUP (SAFE + IDEMPOTENT)
# ==============================

# ------------------------------
# CHECK EXISTING PARTITIONS (NEW)
# ------------------------------
- name: Check existing partitions
  command: "lsblk -nr {{ item.device }}"
  register: disk_state
  changed_when: false
  loop: "{{ disks }}"

# ------------------------------
# CREATE GPT LABEL (ONLY IF EMPTY)
# ------------------------------
- name: Ensure GPT label exists
  community.general.parted:
    device: "{{ item.item.device }}"
    label: gpt
  loop: "{{ disk_state.results }}"
  when: item.stdout_lines | length == 1

# ------------------------------
# CREATE PARTITION (ONLY IF MISSING)
# ------------------------------
- name: Ensure partition exists
  community.general.parted:
    device: "{{ item.item.device }}"
    number: 1
    state: present
    part_type: primary
  loop: "{{ disk_state.results }}"
  when: item.stdout_lines | length == 1

# ------------------------------
# CREATE FILESYSTEM (SAFE)
# ------------------------------
- name: Ensure filesystem exists
  ansible.builtin.filesystem:
    fstype: ext4
    dev: "{{ item.part }}"
  loop: "{{ disks }}"

# ------------------------------
# CREATE MOUNT DIRECTORIES
# ------------------------------
- name: Ensure mount directories exist
  ansible.builtin.file:
    path: "{{ item.mount }}"
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'
  loop: "{{ disks }}"

# ------------------------------
# MOUNT + FSTAB (IDEMPOTENT)
# ------------------------------
- name: Mount disks and persist in fstab
  ansible.posix.mount:
    path: "{{ item.mount }}"
    src: "{{ item.part }}"
    fstype: ext4
    opts: defaults,nofail
    state: mounted
  loop: "{{ disks }}"

# ------------------------------
# OWNERSHIP (RECURSIVE)
# ------------------------------
- name: Set ownership on mount points
  ansible.builtin.file:
    path: "{{ item.mount }}"
    owner: yugabyte
    group: yugabyte
    recurse: yes
  loop: "{{ disks }}"

# ------------------------------
# CREATE TMP DIRECTORY
# ------------------------------
- name: Create tmp directory
  ansible.builtin.file:
    path: /mnt/yba-data/tmp
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'

# ------------------------------
# SELINUX (SAFE)
# ------------------------------
- name: Set SELinux to permissive
  ansible.posix.selinux:
    policy: targeted
    state: permissive