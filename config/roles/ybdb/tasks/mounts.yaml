---
# ==============================
# ENTERPRISE DISK SETUP (COMPATIBLE)
# ==============================

# ------------------------------
# PARTITION TABLE
# ------------------------------
- name: Ensure GPT partition table exists
  community.general.parted:
    device: "{{ item.device }}"
    label: gpt
    state: present
  loop: "{{ disks }}"

# ------------------------------
# PARTITION
# ------------------------------
- name: Ensure partition exists
  community.general.parted:
    device: "{{ item.device }}"
    number: 1
    state: present
    part_type: primary
  loop: "{{ disks }}"

# ------------------------------
# FILESYSTEM
# ------------------------------
- name: Create filesystem if not exists
  ansible.builtin.filesystem:
    fstype: ext4
    dev: "{{ item.part }}"
  loop: "{{ disks }}"

# ------------------------------
# DIRECTORIES
# ------------------------------
- name: Ensure mount directories exist
  ansible.builtin.file:
    path: "{{ item.mount }}"
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'
  loop: "{{ disks }}"

# ------------------------------
# MOUNT
# ------------------------------
- name: Mount disks and persist
  ansible.posix.mount:
    path: "{{ item.mount }}"
    src: "{{ item.part }}"
    fstype: ext4
    opts: defaults,nofail
    state: mounted
  loop: "{{ disks }}"

# ------------------------------
# OWNERSHIP
# ------------------------------
- name: Set ownership
  ansible.builtin.file:
    path: "{{ item.mount }}"
    owner: yugabyte
    group: yugabyte
    recurse: yes
  loop: "{{ disks }}"

# ------------------------------
# TMP
# ------------------------------
- name: Create tmp directory
  ansible.builtin.file:
    path: /mnt/yba-data/tmp
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'

# ------------------------------
# SELINUX
# ------------------------------
- name: Set SELinux permissive
  ansible.posix.selinux:
    policy: targeted
    state: permissive