---
# ==============================
# ENTERPRISE DISK SETUP (SAFE)
# ==============================

# ------------------------------
# CREATE PARTITION TABLE (GPT)
# ------------------------------
- name: Ensure GPT partition table exists
  community.general.parted:
    device: "{{ item.device }}"
    label: gpt
    state: present
  loop: "{{ disks }}"

# ------------------------------
# CREATE PARTITION
# ------------------------------
- name: Ensure partition exists
  community.general.parted:
    device: "{{ item.device }}"
    number: 1
    state: present
    part_type: primary
    fs_type: ext4
  loop: "{{ disks }}"

# ------------------------------
# CREATE FILESYSTEM (ONLY IF NEEDED)
# ------------------------------
- name: Create filesystem if not exists
  filesystem:
    fstype: ext4
    dev: "{{ item.part }}"
  loop: "{{ disks }}"

# ------------------------------
# CREATE MOUNT DIRECTORIES
# ------------------------------
- name: Ensure mount directories exist
  file:
    path: "{{ item.mount }}"
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'
  loop: "{{ disks }}"

# ------------------------------
# MOUNT + FSTAB (IDEMPOTENT)
# ------------------------------
- name: Mount disks and persist in fstab
  mount:
    path: "{{ item.mount }}"
    src: "{{ item.part }}"
    fstype: ext4
    opts: defaults,nofail
    state: mounted
  loop: "{{ disks }}"

# ------------------------------
# OWNERSHIP FIX
# ------------------------------
- name: Set Yugabyte directories ownership
  file:
    path: "{{ item.mount }}"
    owner: yugabyte
    group: yugabyte
    recurse: yes
  loop: "{{ disks }}"

# ------------------------------
# CREATE TMP DIRECTORY
# ------------------------------
- name: Create tmp directory
  file:
    path: /mnt/yba-data/tmp
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'

# ------------------------------
# SELINUX (SAFE)
# ------------------------------
- name: Set SELinux to permissive (if enforcing)
  selinux:
    policy: targeted
    state: permissive