---
# ------------------------------
# CREATE BASE DIR (idempotent)
# ------------------------------
- name: Ensure base dir exists
  file:
    path: "{{ base_dir }}"
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'
  become: yes

# ------------------------------
# DEPLOY SYSTEMD SERVICE
# ------------------------------
- name: Deploy Yugabyte systemd service
  template:
    src: yugabyted.service.j2
    dest: /etc/systemd/system/yugabyted.service
  become: yes
  register: yb_service

- name: Reload systemd if service changed
  command: systemctl daemon-reload
  become: yes
  when: yb_service.changed

# ------------------------------
# ENABLE + START SERVICE
# ------------------------------
- name: Ensure Yugabyte is running
  systemd:
    name: yugabyted
    enabled: yes
    state: started
  become: yes