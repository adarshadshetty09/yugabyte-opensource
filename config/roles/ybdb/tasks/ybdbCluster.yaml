# ===============================
# STEP 1: STOP + DESTROY (ALL NODES)
# ===============================

- name: Stop Yugabyte
  command: "{{ bin_path }} stop --base_dir={{ base_dir }}"
  become_user: yugabyte
  ignore_errors: true
  when: destroy_cluster

- name: Destroy Yugabyte
  command: "{{ bin_path }} destroy --base_dir={{ base_dir }}"
  become_user: yugabyte
  ignore_errors: true
  when: destroy_cluster

# ===============================
# STEP 2: SAFE CLEANUP
# ===============================

- name: Clean only runtime data (SAFE)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /home/yugabyte/var/data
    - /home/yugabyte/var/logs
  ignore_errors: true
  when: destroy_cluster   

- name: Wait after destroy
  pause:
    seconds: 10
  when: destroy_cluster  

# ===============================
# STEP 3: PRIMARY NODE
# ===============================

- name: Start primary node
  command: >
    {{ bin_path }} start
    --advertise_address={{ ansible_host }}
    --base_dir={{ base_dir }}
  become_user: yugabyte
  register: start_output
  failed_when: false
  changed_when: "'already running' not in start_output.stdout"
  when: is_primary

- name: Verify primary is running
  command: "{{ bin_path }} status --base_dir={{ base_dir }}"
  become_user: yugabyte
  register: yb_status
  retries: 15
  delay: 5
  until: "'Running' in yb_status.stdout"
  changed_when: false
  when: is_primary

- name: Wait for master UI (primary)
  wait_for:
    host: "{{ ansible_host }}"
    port: 7000
    delay: 5
    timeout: 300
  when: is_primary

# ===============================
# STEP 4: FOLLOWER NODES
# ===============================

- name: Join follower nodes
  command: >
    {{ bin_path }} start
    --advertise_address={{ ansible_host }}
    --join={{ master_ip }}
    --base_dir={{ base_dir }}
  become_user: yugabyte
  register: join_output
  failed_when: false
  changed_when: "'already running' not in join_output.stdout"
  when: not is_primary
  throttle: 1

- name: Wait before checking follower status
  pause:
    seconds: 20
  when: not is_primary

- name: Verify follower is running
  command: "{{ bin_path }} status --base_dir={{ base_dir }}"
  become_user: yugabyte
  register: yb_status_follower
  retries: 20
  delay: 10
  until: "'Running' in yb_status_follower.stdout"
  changed_when: false
  when: not is_primary

- name: Wait for tserver (followers)
  wait_for:
    host: "{{ ansible_host }}"
    port: 9000
    delay: 5
    timeout: 300
  when: not is_primary