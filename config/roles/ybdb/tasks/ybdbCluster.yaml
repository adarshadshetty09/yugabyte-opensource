- name: Check yugabyted status
  command: "{{ bin_path }} status --base_dir {{ base_dir }}"
  become_user: yugabyte
  register: yb_status
  failed_when: false
  changed_when: false

- name: Check replication factor
  set_fact:
    is_standalone: "{{ 'Replication Factor  : 1' in yb_status.stdout }}"

- name: Stop Yugabyte (only if standalone)
  command: "{{ bin_path }} stop --base_dir {{ base_dir }}"
  become_user: yugabyte
  when: is_standalone

- name: Destroy Yugabyte (only if standalone)
  command: "{{ bin_path }} destroy --base_dir {{ base_dir }}"
  become_user: yugabyte
  when: is_standalone

- name: Remove var dir (only if standalone)
  file:
    path: /home/yugabyte/var
    state: absent
  when: is_standalone

# PRIMARY
- name: Start primary node
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
    --base_dir {{ base_dir }}
  become_user: yugabyte
  when:
    - is_primary
    - is_standalone
  
# FOLLOWERS
- name: Join cluster
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
    --join {{ master_ip }}
    --base_dir {{ base_dir }}
  become_user: yugabyte
  when:
    - not is_primary
    - is_standalone