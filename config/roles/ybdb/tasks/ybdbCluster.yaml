---
# Yugabyte Cluster Setup (exact manual steps)

# ------------------------------
# STOP Yugabyte (all nodes)
# ------------------------------
- name: Stop Yugabyte
  command: "{{ bin_path }} stop"
  become: yes
  become_user: yugabyte
  ignore_errors: true

# ------------------------------
# REMOVE OLD DATA (all nodes)
# ------------------------------
- name: Remove old default data (/home/yugabyte/var)
  file:
    path: /home/yugabyte/var
    state: absent
  become: yes

# ------------------------------
# CLEAN base_dir (all nodes)
# ------------------------------
- name: Clean /mnt/yba-data
  shell: "rm -rf /mnt/yba-data/*"
  become: yes
  become_user: yugabyte

# ------------------------------
# START PRIMARY (node1)
# ------------------------------
- name: Start primary node
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
    --base_dir /mnt/yba-data
  become: yes
  become_user: yugabyte
  when: inventory_hostname == groups['nodes'][0]

# ------------------------------
# WAIT for node1
# ------------------------------
- name: Wait for master UI
  wait_for:
    host: "{{ master_ip }}"
    port: 7000
    delay: 5
    timeout: 120
  when: inventory_hostname != groups['nodes'][0]

# ------------------------------
# START node2 + node3 (JOIN)
# ------------------------------
- name: Start follower nodes
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
    --join {{ master_ip }}
    --base_dir /mnt/yba-data
  become: yes
  become_user: yugabyte
  when: inventory_hostname != groups['nodes'][0]