---
# Yugabyte Cluster Setup

# ------------------------------
# Check binary exists
# ------------------------------
- name: Check yugabyted exists
  stat:
    path: "{{ bin_path }}"
  register: yb_binary

- name: Fail if yugabyted not found
  fail:
    msg: "yugabyted not found at {{ bin_path }}"
  when: not yb_binary.stat.exists

# ------------------------------
# Idempotency check
# ------------------------------
- name: Check Yugabyte status
  command: "{{ bin_path }} status"
  register: yb_status
  failed_when: false
  changed_when: false
  become: yes
  become_user: yugabyte

- name: Set running flag
  set_fact:
    yb_running: "{{ 'Running' in yb_status.stdout }}"

# ------------------------------
# Start PRIMARY node
# ------------------------------
- name: Start primary node
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
  become: yes
  become_user: yugabyte
  when:
    - inventory_hostname == groups['nodes'][0]
    - not yb_running

# ------------------------------
# Wait for master
# ------------------------------
- name: Wait for master UI
  wait_for:
    host: "{{ master_ip }}"
    port: 7000
    delay: 5
    timeout: 120
  when:
    - inventory_hostname != groups['nodes'][0]
    - not yb_running

# ------------------------------
# Start FOLLOWER nodes
# ------------------------------
- name: Start follower nodes
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
    --join {{ master_ip }}
  become: yes
  become_user: yugabyte
  when:
    - inventory_hostname != groups['nodes'][0]
    - not yb_running