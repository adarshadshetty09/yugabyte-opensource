---
# ===============================
# STEP 1: CLEAN EXISTING (ALL NODES)
# ===============================

- name: Stop Yugabyte
  command: "{{ bin_path }} stop --base_dir {{ base_dir }}"
  become_user: yugabyte
  ignore_errors: true

- name: Destroy Yugabyte
  command: "{{ bin_path }} destroy --base_dir {{ base_dir }}"
  become_user: yugabyte
  ignore_errors: true

- name: Remove old var directory
  file:
    path: /home/yugabyte/var
    state: absent
  become: yes

# ===============================
# STEP 2: PRIMARY NODE
# ===============================

- name: Start primary node
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
    --base_dir {{ base_dir }}
  become_user: yugabyte
  when: is_primary

- name: Wait for master UI (primary)
  wait_for:
    host: "{{ ansible_host }}"
    port: 7000
    delay: 5
    timeout: 300
  when: is_primary

# ===============================
# STEP 3: FOLLOWER NODES
# ===============================

- name: Join follower nodes
  command: >
    {{ bin_path }} start
    --advertise_address {{ ansible_host }}
    --join {{ master_ip }}
    --base_dir {{ base_dir }}
  become_user: yugabyte
  when: not is_primary

- name: Wait for tserver
  wait_for:
    host: "{{ ansible_host }}"
    port: 9000
    delay: 5
    timeout: 300
  when: not is_primary