- name: Install required packages
  yum:
    name: yum-utils
    state: present

- name: Add Docker repo
  command: >
    yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: Install Docker
  yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Start Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Add ansible user to docker group
  user:
    name: ansible
    groups: docker
    append: yes

# ===============================
#  FIX: Required for docker_container module
# ===============================

- name: Install Python3 and pip
  yum:
    name:
      - python3
      - python3-pip
    state: present

- name: Install Python libraries (docker + requests)
  pip:
    name:
      - docker
      - requests
    executable: pip3