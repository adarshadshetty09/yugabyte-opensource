- name: Download Blackbox Exporter
  get_url:
    url: https://github.com/prometheus/blackbox_exporter/releases/download/v0.28.0/blackbox_exporter-0.28.0.linux-amd64.tar.gz
    dest: /tmp/blackbox.tar.gz

- name: Extract Blackbox Exporter
  unarchive:
    src: /tmp/blackbox.tar.gz
    dest: /opt
    remote_src: yes

- name: Copy binary
  copy:
    src: /opt/blackbox_exporter-0.28.0.linux-amd64/blackbox_exporter
    dest: /usr/local/bin/blackbox_exporter
    mode: '0755'
    remote_src: yes

- name: Create config dir
  file:
    path: /etc/blackbox_exporter
    state: directory

- name: Create config file
  copy:
    dest: /etc/blackbox_exporter/config.yml
    content: |
      modules:
        http_2xx:
          prober: http
          timeout: 5s

#  NEW — systemd service
- name: Create Blackbox systemd service
  template:
    src: blackbox_exporter.service.j2
    dest: /etc/systemd/system/blackbox_exporter.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart Blackbox
    

- name: Enable Blackbox Exporter
  systemd:
    name: blackbox_exporter
    enabled: yes