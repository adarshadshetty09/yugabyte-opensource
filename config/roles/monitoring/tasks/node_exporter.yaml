- name: Create Node Exporter user
  user:
    name: node_exporter
    shell: /sbin/nologin

- name: Download Node Exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz

- name: Extract
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: yes

- name: Find extracted node exporter directory
  find:
    paths: /tmp
    patterns: "node_exporter-*"
    file_type: directory
  register: node_exporter_dir

- name: Copy node exporter binary
  copy:
    src: "{{ node_exporter_dir.files[0].path }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: yes

- name: Create systemd service
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter

      [Service]
      User=node_exporter
      ExecStart=/usr/local/bin/node_exporter --web.listen-address=":9200"

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd
  command: systemctl daemon-reexec

- name: Start Node Exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: started