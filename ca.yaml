---
# =========================
# PLAY 1: Generate CA + Certs
# =========================
- name: TLS Setup - Generate Certificates
  hosts: localhost
  gather_facts: no
  become: yes

  vars:
    base_dir: "/home/ansible/certs"
    ca_dir: "{{ base_dir }}/secure-data"
    nodes_dir: "{{ base_dir }}/nodes"
    nodes: "{{ groups['yugabyte_nodes'] }}"

  tasks:

    - name: Install OpenSSL
      package:
        name: openssl
        state: present

    - name: Create directories
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ ca_dir }}"
        - "{{ nodes_dir }}"

    - name: Create CA config
      copy:
        dest: "{{ ca_dir }}/ca.conf"
        content: |
          [ ca ]
          default_ca = my_ca

          [ my_ca ]
          default_days = 3650
          serial = {{ ca_dir }}/serial.txt
          database = {{ ca_dir }}/index.txt
          default_md = sha256
          policy = my_policy

          [ my_policy ]
          organizationName = supplied
          commonName = supplied

          [ req ]
          prompt = no
          distinguished_name = my_distinguished_name
          x509_extensions = my_extensions

          [ my_distinguished_name ]
          organizationName = Yugabyte
          commonName = CA for YugabyteDB

          [ my_extensions ]
          keyUsage = critical,digitalSignature,nonRepudiation,keyEncipherment,keyCertSign
          basicConstraints = critical,CA:true,pathlen:1

    - name: Initialize CA DB
      file:
        path: "{{ item }}"
        state: touch
      loop:
        - "{{ ca_dir }}/index.txt"

    - name: Initialize serial
      copy:
        dest: "{{ ca_dir }}/serial.txt"
        content: "01"

    - name: Generate CA key
      command: openssl genrsa -out {{ ca_dir }}/ca.key 2048
      args:
        creates: "{{ ca_dir }}/ca.key"

    - name: Generate CA cert
      command: >
        openssl req -new -x509
        -days 3650
        -config {{ ca_dir }}/ca.conf
        -key {{ ca_dir }}/ca.key
        -out {{ ca_dir }}/ca.crt
      args:
        creates: "{{ ca_dir }}/ca.crt"

    - name: Generate node configs
      template:
        src: templates/node.conf.j2
        dest: "{{ nodes_dir }}/{{ hostvars[item].ansible_host }}.conf"
      loop: "{{ nodes }}"

    - name: Generate node keys
      command: >
        openssl genrsa -out
        {{ nodes_dir }}/node.{{ hostvars[item].ansible_host }}.key 2048
      loop: "{{ nodes }}"

    - name: Generate CSR
      command: >
        openssl req -new
        -config {{ nodes_dir }}/{{ hostvars[item].ansible_host }}.conf
        -key {{ nodes_dir }}/node.{{ hostvars[item].ansible_host }}.key
        -out {{ nodes_dir }}/node.{{ hostvars[item].ansible_host }}.csr
      loop: "{{ nodes }}"

    - name: Sign certificates
      command: >
        openssl ca -config {{ ca_dir }}/ca.conf
        -keyfile {{ ca_dir }}/ca.key
        -cert {{ ca_dir }}/ca.crt
        -policy my_policy
        -out {{ nodes_dir }}/node.{{ hostvars[item].ansible_host }}.crt
        -in {{ nodes_dir }}/node.{{ hostvars[item].ansible_host }}.csr
        -days 3650
        -batch
        -extfile {{ nodes_dir }}/{{ hostvars[item].ansible_host }}.conf
        -extensions req_ext
      loop: "{{ nodes }}"