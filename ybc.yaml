- name: Setup YBC properly (fully idempotent)
  hosts: db_nodes
  become: yes
  become_user: yugabyte

  vars:
    yb_home: /home/yugabyte/yugabyte-2024.2.8.0
    ybc_tar: ybc-2.0.0.0-b19-linux-x86_64.tar.gz
    ybc_src: "{{ yb_home }}/share/{{ ybc_tar }}"
    ybc_extract_dir: "{{ yb_home }}/share/ybc-2.0.0.0-b19-linux-x86_64"
    ybc_share_dir: "{{ yb_home }}/share/ybc"
    ybc_final_dir: "{{ yb_home }}/ybc"

  tasks:

    # 🔍 Initial checks
    - name: Check final YBC
      stat:
        path: "{{ ybc_final_dir }}"
      register: ybc_final

    - name: Check share YBC
      stat:
        path: "{{ ybc_share_dir }}"
      register: ybc_share

    - name: Check extracted dir
      stat:
        path: "{{ ybc_extract_dir }}"
      register: ybc_extracted

    # 📦 Extract
    - name: Extract YBC
      unarchive:
        src: "{{ ybc_src }}"
        dest: "{{ yb_home }}/share/"
        remote_src: yes
      when:
        - not ybc_final.stat.exists
        - not ybc_share.stat.exists
        - not ybc_extracted.stat.exists

    # 🔄 Rename extracted → share/ybc
    - name: Rename extracted folder
      command: mv "{{ ybc_extract_dir }}" "{{ ybc_share_dir }}"
      args:
        removes: "{{ ybc_extract_dir }}"
      when:
        - ybc_extracted.stat.exists
        - not ybc_share.stat.exists

    # 🚚 Move to final location
    - name: Move YBC to final location
      command: mv "{{ ybc_share_dir }}" "{{ ybc_final_dir }}"
      args:
        removes: "{{ ybc_share_dir }}"
      when:
        - ybc_share.stat.exists
        - not ybc_final.stat.exists

    # 🔄 Re-check AFTER move (IMPORTANT FIX)
    - name: Refresh final YBC status
      stat:
        path: "{{ ybc_final_dir }}"
      register: ybc_final_updated

    # 🧹 Cleanup tar
    - name: Remove tar file
      file:
        path: "{{ ybc_src }}"
        state: absent
      when: ybc_final_updated.stat.exists

    # ⚙️ Post install
- name: Check if YBC already initialized
  stat:
    path: "{{ ybc_final_dir }}/controller"
  register: ybc_initialized

- name: Run post install
  shell: >
    {{ ybc_final_dir }}/bin/post_install.sh
    --yugabytedb_dir {{ yb_home }}
    --advertise_address {{ ansible_host }}
  when:
    - ybc_final_updated.stat.exists
    - not ybc_initialized.stat.exists