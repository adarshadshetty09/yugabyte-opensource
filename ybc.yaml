- name: Setup YBC properly (fully idempotent)
  hosts: db_nodes
  become: yes
  become_user: yugabyte

  vars:
    yb_home: /home/yugabyte/yugabyte-2024.2.8.0
    ybc_tar: ybc-2.0.0.0-b19-linux-x86_64.tar.gz
    ybc_src: "{{ yb_home }}/share/{{ ybc_tar }}"
    ybc_extract_dir: "{{ yb_home }}/share/ybc-2.0.0.0-b19-linux-x86_64"
    ybc_share_dir: "{{ yb_home }}/share/ybc"
    ybc_final_dir: "{{ yb_home }}/ybc"

  tasks:

    # -------------------------------
    # Check current state (source of truth)
    # -------------------------------
    - name: Check YBC binary
      stat:
        path: "{{ ybc_final_dir }}/bin/yb-controller-server"
      register: ybc_binary

    - name: Check tar file exists
      stat:
        path: "{{ ybc_src }}"
      register: ybc_tar_file

    # -------------------------------
    # Extract (only if not installed)
    # -------------------------------
    - name: Extract YBC
      unarchive:
        src: "{{ ybc_src }}"
        dest: "{{ yb_home }}/share/"
        remote_src: yes
      when:
        - not ybc_binary.stat.exists
        - ybc_tar_file.stat.exists

    # -------------------------------
    # Move to final location safely
    # -------------------------------
    - name: Move YBC to final location
      shell: |
        if [ -d "{{ ybc_extract_dir }}" ] && [ ! -d "{{ ybc_final_dir }}" ]; then
          mv "{{ ybc_extract_dir }}" "{{ ybc_final_dir }}"
        elif [ -d "{{ ybc_share_dir }}" ] && [ ! -d "{{ ybc_final_dir }}" ]; then
          mv "{{ ybc_share_dir }}" "{{ ybc_final_dir }}"
        fi
      args:
        creates: "{{ ybc_final_dir }}"
      when: not ybc_binary.stat.exists

    # -------------------------------
    # Fix ownership (VERY IMPORTANT)
    # -------------------------------
    - name: Ensure correct ownership
      file:
        path: "{{ ybc_final_dir }}"
        owner: yugabyte
        group: yugabyte
        recurse: yes
      when: not ybc_binary.stat.exists

    # -------------------------------
    # Fix permissions
    # -------------------------------
    - name: Ensure binaries executable
      file:
        path: "{{ ybc_final_dir }}/bin"
        mode: '0755'
        recurse: yes
      when: not ybc_binary.stat.exists

    # -------------------------------
    # Verify installation (HARD CHECK)
    # -------------------------------
    - name: Verify YBC binary exists
      stat:
        path: "{{ ybc_final_dir }}/bin/yb-controller-server"
      register: ybc_binary_final

    - name: Fail if YBC installation failed
      fail:
        msg: "YBC installation failed - yb-controller-server not found"
      when: not ybc_binary_final.stat.exists

    # -------------------------------
    # Run post install (only once)
    # -------------------------------
    - name: Check if YBC already initialized
      stat:
        path: "{{ ybc_final_dir }}/controller"
      register: ybc_initialized

    - name: Run post install
      shell: >
        {{ ybc_final_dir }}/bin/post_install.sh
        --yugabytedb_dir {{ yb_home }}
        --advertise_address {{ ansible_host }}
      when:
        - ybc_binary_final.stat.exists
        - not ybc_initialized.stat.exists

    # -------------------------------
    # Cleanup tar (optional)
    # -------------------------------
    - name: Remove tar file
      file:
        path: "{{ ybc_src }}"
        state: absent
      when: ybc_binary_final.stat.exists